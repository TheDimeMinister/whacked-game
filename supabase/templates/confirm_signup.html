<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Confirm your Whacked! account</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #0a0b0f;
      font-family:
        system-ui,
        -apple-system,
        'Segoe UI',
        sans-serif;
      color: #e8eaef;
    "
  >
    <!-- Paste into Supabase → Authentication → Email templates → Confirm signup -->
    <!-- Envelope From (e.g. TheAgency@officeassassination.com): Project Settings → Authentication → SMTP — not this HTML. -->
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #0a0b0f; padding: 28px 16px 40px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 440px; background: #12141c; border-radius: 14px; border: 1px solid #1e2230"
          >
            <tr>
              <td style="padding: 28px 24px 12px; text-align: center">
                <img
                  src="{{ .SiteURL }}/brand/whacked-logo.png"
                  width="160"
                  height="auto"
                  alt="Whacked!"
                  style="display: block; margin: 0 auto; max-width: 200px; height: auto"
                />
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 24px 8px; text-align: center">
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    letter-spacing: 0.12em;
                    text-transform: uppercase;
                    color: #3ecfbc;
                    font-weight: 700;
                  "
                >
                  Confirm your operative file
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 12px 24px 8px">
                <p style="margin: 0 0 14px; font-size: 15px; line-height: 1.55; color: #c9ceda">
                  Welcome to <strong style="color: #e8eaef">Whacked!</strong> Confirm the email
                  <strong style="color: #e8eaef">{{ .Email }}</strong> to activate your account and join the room.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 24px 28px; text-align: center">
                <a
                  href="{{ .ConfirmationURL }}"
                  style="
                    display: inline-block;
                    padding: 14px 28px;
                    background: #3ecfbc;
                    color: #0a0b0f;
                    text-decoration: none;
                    font-weight: 800;
                    font-size: 14px;
                    letter-spacing: 0.06em;
                    border-radius: 10px;
                  "
                  >Confirm email</a
                >
              </td>
            </tr>
            <tr>
              <td style="padding: 0 24px 28px">
                <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #6b7280; word-break: break-all">
                  Link not working? Paste this URL into your browser:<br />
                  <span style="color: #8b92a8">{{ .ConfirmationURL }}</span>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

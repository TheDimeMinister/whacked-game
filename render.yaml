# Render Blueprint — new Web Services get https://whacked-api.onrender.com when
# the slug `whacked-api` is available at creation time.
#
# Renaming an existing service usually does NOT change its default *.onrender.com
# hostname. For a clean URL on an old service, use Custom Domains in the dashboard
# or migrate to a freshly named service and copy env vars.
#
# Env vars: set in the Render dashboard (secrets), not committed here.

services:
  - type: web
    name: whacked-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
